<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 50px;
            line-height: 1.6;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            color: #ffffff;
        }
        form {
            background: rgba(255, 255, 255, 0.06);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
        label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.90rem;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
        transition: color 0.3s ease;
        }

        input, select {
        width: 100%;
        margin: 8px 0 15px 0;
        box-sizing: border-box;
        padding: 14px 16px;
        font-size: 1rem;
        color: #f0f0f0;
        background-color: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        outline: none;
        transition:
            border-color 0.3s ease,
            background-color 0.3s ease,
            box-shadow 0.3s ease;
        font-family: inherit;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            opacity: 0.6;
        }
        
        select option {
            background-color: #24243e;
            color: #f0f0f0;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px;
            font-size: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        h3 {
            margin-top: 20px;
            color: #333;
            background: white;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .row {display: flex; gap: 15px;}
        .col {flex: 1;}

    </style>
</head>

<body>
    <h2>Car Price Predictor</h2>
    <form action="/predict" method="post">
        <label>Year:</label>
        <input type="number" name="Year" placeholder="e.g. 2015" required>

        <label>Car Brand:</label>
        <select  name="Car" >
            <option>Chevrolet</option>
            <option>Datsun</option>
            <option>Fiat</option>
            <option>Ford</option>
            <option>Honda</option>
            <option>Hyundai</option>
            <option>KIA</option>
            <option>MG</option>
            <option>Mahindra</option>
            <option>Maruti</option>
            <option>Nissan</option>
            <option>Renault</option>
            <option>Skoda</option>
            <option>Tata</option>
            <option>Toyota</option>
            <option>Volkswagen</option>
        </select>


        <label>Model:</label>
        <input type="text" name="Model" placeholder="e.g. Grand i10" required>

        <label>Kilometers Driven:</label>
        <input type="number" name="Kilometers" placeholder="e.g. 79240" required>

        <div class="row">
            <div class="col">
                <label>Fuel Type:</label>
                <select name="Fuel">
                    <option value="0">Petrol</option>
                    <option value="1">Diesel</option>
                </select>
            </div>
            <div class="col">
                <label>Transmission:</label>
                <select name="Transmission">
                    <option value="0">Manual</option>
                    <option value="1">Automatic</option>
                </select>
            </div>
        </div>

        <button type="submit">Predict Price</button>
    </form>

    {% if prediction_text %}
        <h3>{{ prediction_text }}</h3>
    {% endif %}
</body>
</html>
